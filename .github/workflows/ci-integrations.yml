# BrowserStack y Percy: solo manual; requieren secretos en el repo.
# Separado de ci.yml porque las condiciones `if: secrets.*` fallan la validación del workflow en GitHub.
name: CI integrations

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browserstack-iphone:
    name: e2e-browserstack-iphone
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: E2E iPhone (BrowserStack Node SDK + browserstack.yml)
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: npm run test:e2e:browserstack

  percy:
    name: percy-visual
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Percy + Playwright (chromium)
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: npx percy exec -- npm run test:percy
