# Push/PR a main: quality-gate completo + E2E Playwright.
# quality = STATE_OF_APP + lint + test + test:ui + vite build (sin depender de secrets).
# Nota: GitHub rechaza `secrets` dentro de `if:` en este workflow; Sentry opcional vía shell.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality-and-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (fast fail)
        run: npm run lint

      - name: Quality gate
        run: npm run quality

      - name: Install Playwright Chromium + WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: E2E tests (Chromium + WebKit)
        run: npm run test:e2e

      - name: Sentry smoke (optional)
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          if [ -z "${VITE_SENTRY_DSN:-}" ]; then
            echo "Sentry smoke skipped (no VITE_SENTRY_DSN secret)."
            exit 0
          fi
          npm run test:sentry
