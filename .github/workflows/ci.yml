# Push/PR a main: quality-gate completo + E2E Playwright.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  quality:
    name: quality-and-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Quality gate
        run: npm run quality 2>&1 | tee quality-ci.log

      - name: Upload quality log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-ci-log
          path: quality-ci.log
          if-no-files-found: ignore

      - name: Install Playwright Chromium + WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: E2E tests (Chromium + WebKit)
        run: npx playwright test

      - name: Sentry smoke (optional)
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          if [ -z "${VITE_SENTRY_DSN:-}" ]; then
            echo "Sentry smoke skipped (no VITE_SENTRY_DSN secret)."
            exit 0
          fi
          npx playwright test e2e/sentry-smoke.spec.ts --project=chromium
